name: Publish website and RSS

on:
  push:
    branches: [main]
  schedule:
    - cron: "15 3,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update durable publication history
        run: python publication_history.py sync
      - name: Build public website and RSS
        run: python build.py
      - name: Verify public output
        run: python -m unittest discover -s tests -v
      - name: Commit newly released content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data/publication_history.json
          if git diff --cached --quiet; then
            echo "No new content to publish."
          else
            git commit -m "Publish scheduled content and history"
            git push
          fi
